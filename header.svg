<svg viewBox="0 0 1200 300" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc">
<title id="ttl">Animated header</title>
<desc id="dsc">Dense dark navy banner: many flowing cyan waves drift up and down behind a large node network firing signal pulses along its links.</desc>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#080d1a"/>
<stop offset="0.5" stop-color="#0b1428"/>
<stop offset="1" stop-color="#0f2140"/>
</linearGradient>
<radialGradient id="halo" cx="0.78" cy="0.42" r="0.65">
<stop offset="0" stop-color="#22d3ee" stop-opacity="0.15"/>
<stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
</radialGradient>
<linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
<stop offset="0.4" stop-color="#38bdf8" stop-opacity="0.1"/>
<stop offset="1" stop-color="#67e8f9" stop-opacity="0.4"/>
</linearGradient>
<radialGradient id="dot" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#a5f3fc" stop-opacity="0.95"/>
<stop offset="0.4" stop-color="#5eead4" stop-opacity="0.5"/>
<stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
</radialGradient>
<style>
@keyframes flow{0%,100%{transform:translateY(-10px)}50%{transform:translateY(10px)}}
@keyframes flow2{0%,100%{transform:translateY(11px)}50%{transform:translateY(-11px)}}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes travel{from{stroke-dashoffset:0}to{stroke-dashoffset:-100}}
.wave{fill:none;stroke:url(#fade);stroke-width:1}
.w1{animation:flow 7s ease-in-out infinite}
.w2{animation:flow2 8s ease-in-out infinite .5s}
.w3{animation:flow 9s ease-in-out infinite 1s}
.w4{animation:flow2 7.5s ease-in-out infinite .3s}
.w5{animation:flow 8.5s ease-in-out infinite 1.5s}
.w6{animation:flow2 9.5s ease-in-out infinite .8s}
.edge{stroke:#38bdf8;stroke-opacity:.22;stroke-width:.9}
.pulse{fill:none;stroke:#bae6fd;stroke-width:2;stroke-linecap:round;stroke-dasharray:6 94;animation:travel 2.4s linear infinite}
.core{fill:#e0fbff}
.tw{animation:twinkle 3.2s ease-in-out infinite}
</style>
</defs>
<rect width="1200" height="300" fill="url(#bg)"/>
<rect width="1200" height="300" fill="url(#halo)"/>
